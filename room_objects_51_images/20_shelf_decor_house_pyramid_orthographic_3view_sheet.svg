<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">

<defs>
  <linearGradient id="gPink" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ffd4e4"/><stop offset="100%" stop-color="#e56fa0"/>
  </linearGradient>
  <linearGradient id="gWood" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#f5d4bd"/><stop offset="100%" stop-color="#d6a47a"/>
  </linearGradient>
</defs>

<rect x="0" y="0" width="1400" height="980" fill="#fff8fb"/>
<text x="700" y="42" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#5c4352" text-anchor="middle">Декоративный домик/пирамидка на полке — 3 ортографических SVG-вида</text>
<text x="700" y="72" font-family="Arial, sans-serif" font-size="17" fill="#5c4352" text-anchor="middle">Итерация v5. Исправлены 11 дверь и 20 декоративный домик.</text>
<g transform="translate(160,120)"><text x="320" y="-18" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#5c4352" text-anchor="middle">TOP</text>
<g>
  <!-- base hidden under roof but slightly visible around edges -->
  <rect x="370" y="198" width="160" height="124" rx="8" fill="#fff4c7" stroke="#2f2530" stroke-width="2"/>
  <!-- roof larger than base and overhanging -->
  <rect x="334" y="166" width="232" height="168" rx="10" fill="#ffd4e4" stroke="#2f2530" stroke-width="4"/>
  <line x1="450" y1="166" x2="450" y2="334" stroke="#e56fa0" stroke-width="4"/>
  <rect x="492" y="176" width="18" height="34" rx="4" fill="#d6a47a" stroke="#2f2530" stroke-width="2"/>
  <rect x="342" y="314" width="216" height="12" rx="4" fill="#e56fa0" opacity="0.35"/>
</g>
</g>
<g transform="translate(160,550)"><text x="320" y="-18" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#5c4352" text-anchor="middle">SIDE</text>
<g>
  <line x1="100" y1="292" x2="800" y2="292" stroke="#b98aa0" stroke-width="3" stroke-dasharray="10 8"/>
  <rect x="360" y="220" width="180" height="72" rx="12" fill="#fff4c7" stroke="#2f2530" stroke-width="4"/>
  <path d="M 350 220 L 450 150 L 550 220 Z" fill="#ffd4e4" stroke="#2f2530" stroke-width="4"/>
  <rect x="430" y="242" width="40" height="30" rx="7" fill="#ffffff" stroke="#2f2530" stroke-width="2"/>
</g>
</g>
<g transform="translate(880,550)"><text x="152" y="-18" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#5c4352" text-anchor="middle">FRONT</text>
<g>
  <line x1="64" y1="292" x2="496" y2="292" stroke="#b98aa0" stroke-width="3" stroke-dasharray="10 8"/>
  <rect x="172" y="220" width="216" height="72" rx="12" fill="#fff4c7" stroke="#2f2530" stroke-width="4"/>
  <path d="M 160 220 L 280 150 L 400 220 Z" fill="#ffd4e4" stroke="#2f2530" stroke-width="4"/>
  <rect x="260" y="242" width="40" height="30" rx="7" fill="#ffffff" stroke="#2f2530" stroke-width="2"/>
</g>
