<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">

<defs>
  <linearGradient id="gWood" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#f5d4bd"/>
    <stop offset="100%" stop-color="#d6a47a"/>
  </linearGradient>
</defs>

<rect x="0" y="0" width="1400" height="980" fill="#fff8fb"/>
<text x="700" y="42" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#5c4352" text-anchor="middle">Мольберт — 3 ортографических SVG-вида</text>
<text x="700" y="72" font-family="Arial, sans-serif" font-size="17" fill="#5c4352" text-anchor="middle">v6: TOP пересобран как 3 балки, сходящиеся в верхней точке, с держателем между ними.</text>
<g transform="translate(160,120)">
  <text x="320" y="-18" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#5c4352" text-anchor="middle">TOP</text>
  
<g>
  <!-- top head / clamp -->
  <circle cx="450" cy="112" r="16" fill="#e8c09b" stroke="#2f2530" stroke-width="3"/>

  <!-- three beams from the top node -->
  <line x1="450" y1="128" x2="450" y2="356" stroke="#d6a47a" stroke-width="14" stroke-linecap="round"/>
  <line x1="446" y1="124" x2="350" y2="330" stroke="#d6a47a" stroke-width="14" stroke-linecap="round"/>
  <line x1="454" y1="124" x2="550" y2="330" stroke="#d6a47a" stroke-width="14" stroke-linecap="round"/>

  <!-- holder / canvas tray between beams -->
  <rect x="386" y="222" width="128" height="22" rx="8" fill="url(#gWood)" stroke="#2f2530" stroke-width="3"/>

  <!-- small upright holder block -->
  <rect x="438" y="196" width="24" height="24" rx="6" fill="#e8c09b" stroke="#2f2530" stroke-width="2"/>

  <!-- feet hints -->
  <circle cx="350" cy="330" r="7" fill="#d6a47a" stroke="#2f2530" stroke-width="2"/>
  <circle cx="550" cy="330" r="7" fill="#d6a47a" stroke="#2f2530" stroke-width="2"/>
  <circle cx="450" cy="356" r="7" fill="#d6a47a" stroke="#2f2530" stroke-width="2"/>
</g>

</g>
<g transform="translate(160,550)">
  <text x="320" y="-18" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#5c4352" text-anchor="middle">SIDE</text>
  
<g>
  <line x1="90" y1="292" x2="810" y2="292" stroke="#b98aa0" stroke-width="3" stroke-dasharray="10 8"/>
  <line x1="430" y1="66" x2="360" y2="292" stroke="#d6a47a" stroke-width="12" stroke-linecap="round"/>
  <line x1="430" y1="66" x2="500" y2="292" stroke="#d6a47a" stroke-width="12" stroke-linecap="round"/>
  <line x1="430" y1="66" x2="430" y2="292" stroke="#d6a47a" stroke-width="10" stroke-linecap="round"/>
  <rect x="425" y="190" width="10" height="22" rx="4" fill="url(#gWood)" stroke="#2f2530" stroke-width="2"/>
  <rect x="414" y="110" width="32" height="24" rx="8" fill="#e8c09b" stroke="#2f2530" stroke-width="2"/>
</g>

</g>
<g transform="translate(880,550)">
  <text x="152" y="-18" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#5c4352" text-anchor="middle">FRONT</text>
  
<g>
  <line x1="64" y1="292" x2="496" y2="292" stroke="#b98aa0" stroke-width="3" stroke-dasharray="10 8"/>
  <line x1="280" y1="66" x2="210" y2="292" stroke="#d6a47a" stroke-width="12" stroke-linecap="round"/>
  <line x1="280" y1="66" x2="350" y2="292" stroke="#d6a47a" stroke-width="12" stroke-linecap="round"/>
  <line x1="280" y1="66" x2="280" y2="292" stroke="#d6a47a" stroke-width="10" stroke-linecap="round"/>
  <rect x="196" y="192" width="168" height="18" rx="8" fill="url(#gWood)" stroke="#2f2530" stroke-width="3"/>
  <rect x="258" y="110" width="44" height="24" rx="8" fill="#e8c09b" stroke="#2f2530" stroke-width="2"/>
</g>

</g>
</svg>